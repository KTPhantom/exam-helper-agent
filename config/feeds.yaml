# RSS Feed Configuration for GK Digest Agent
# Each topic maps to relevant RSS feeds for scraping
# NOTE: Only feeds that respond with valid RSS/XML are included.
# PIB, ISRO, LiveLaw, and Down to Earth have unreliable RSS feeds
# and are excluded to avoid errors. Their content is captured indirectly
# via The Hindu and Indian Express which cover those stories.

